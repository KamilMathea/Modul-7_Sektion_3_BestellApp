<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bestell-App</title>

    <link rel="shortcut icon" href="./assets/icons/faviconBurger.svg" type="image/x-icon">

    <link rel="stylesheet" href="./styles/standard.css">
    <link rel="stylesheet" href="./styles/fonts.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="./styles/menu.css">
    <link rel="stylesheet" href="./styles/basket.css">
    <link rel="stylesheet" href="./styles/responsive.css">
</head>

<body onload="init()">
    <header>
        <div class="nav_container">
            <img src="./assets/icons/Logo01.svg" alt="Bestell-App Logo">
            <div class="burger-menu">
                <span class="line"></span>
                <span class="line"></span>
                <span class="line"></span>
            </div>
        </div>
    </header>
    <main>
        <section class="main_dishes_container">
            <div class="restaurant_header">
                <div class="hero_image_container">
                    <img src="./assets/img/heroPhoto.jpg" alt="Essenbild">
                </div>

                <div class="hero_logo_container">
                    <img src="./assets/icons/logoBurger.svg" alt="BurgerHouse Logo">
                </div>

                <div class="restaurant_header_text">
                    <div class="headline_and_reviews">
                        <h1><span>Burger</span>House</h1>
                        <div class="reviews">
                            <img src="./assets/icons/star.svg" alt="Star-Icon">
                            <span><strong>4,3</strong> (345)</span>
                        </div>
                    </div>
                    <p><strong>The best of Burgers, Pizza and Greens, all in one great place.</strong></p>

                </div>
            </div>
            <section id="menu_content">

            </section>
        </section>

        <aside class="basket_wrapper">
            <div class="basket_sticky_container">
                <h2>Your Basket</h2>
                <div id="basket_items">
                    <p>your basket is empty</p>
                </div>
                <div id="basket_footer">

                </div>
            </div>

        </aside>
    </main>
    <footer>
        <p>&copy; 2026 BurgerHouse. All rights reserved.</p>
        <a href="#">Imprint</a>
        <a href="#">Cookie Preferences</a>

    </footer>

    <div id="order_success" class="d-none success_overlay">
        <div class="success_card">
            <span class="close_icon" onclick="closeSuccessMessage()">×</span>
            <h2>Order confirmed!</h2>
            <p>Your food is on the way!</p>
        </div>
    </div>

    <script src="scripts/db.js"></script>
    <script src="scripts/templates.js"></script>
    <script src="script.js"></script>
</body>

</html>
